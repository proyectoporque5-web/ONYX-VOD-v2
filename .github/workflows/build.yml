name: Construir ONYX (Instalación Forzada V11)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Compilación Release
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 4. 🚨 INSTALACIÓN DE EMERGENCIA (Forzar Expo)
        run: |
          # Borramos cualquier basura previa
          rm -rf node_modules package-lock.json android
          
          # FORZAMOS la instalación de Expo SDK 50 y React Native
          # Esto arregla el error "expo module not found"
          npm install expo@^50.0.0 \
                      react-native@0.73.6 \
                      react@18.2.0 \
                      expo-router \
                      expo-av \
                      expo-status-bar \
                      expo-constants \
                      expo-linking \
                      react-native-safe-area-context \
                      react-native-screens \
                      react-native-webview \
                      react-native-youtube-iframe \
                      axios \
                      nativewind \
                      tailwindcss \
                      @react-native-async-storage/async-storage \
                      --save

          # Instalamos las herramientas de línea de comandos
          npm install -g expo-cli eas-cli

      - name: 5. Generar Assets (Iconos)
        run: |
          mkdir -p assets
          curl -L "https://dummyimage.com/1024x1024/000000/ff0000.png&text=ONYX" > assets/icon.png
          cp assets/icon.png assets/adaptive-icon.png
          curl -L "https://dummyimage.com/1242x2436/000000/ff0000.png&text=LOADING" > assets/splash.png
          curl -L "https://dummyimage.com/48x48/000000/ff0000.png" > assets/favicon.png

      - name: 6. Prebuild Android (Generar carpetas nativas)
        run: npx expo prebuild --platform android --clean

      - name: 7. Inyectar Llave de Seguridad (Evita Pantalla Roja)
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore release.keystore -alias onyx-key -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Onyx" -storepass onyx1234 -keypass onyx1234
          echo "storeFile=release.keystore" > keystore.properties
          echo "storePassword=onyx1234" >> keystore.properties
          echo "keyAlias=onyx-key" >> keystore.properties
          echo "keyPassword=onyx1234" >> keystore.properties

      - name: 8. Compilar APK (MODO PRODUCCION)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -x lint --stacktrace

      - name: 9. Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: ONYX-APK-FINAL
          path: android/app/build/outputs/apk/release/app-release.apk
